services:
  php:
    image: php
    build:
      context: .
      dockerfile: ./docker/php/dockerfile
    volumes:
      - .:/var/www/html
    networks:
      - internal
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/var/www/html/public
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - internal
    depends_on:
      - php

  db:
    image: mysql:8.1
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nexus-new
      MYSQL_USER: nexus
      MYSQL_PASSWORD: nexus
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

  cache:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: cache
    ulimits:
      memlock: -1
    environment:
      - DFLY_maxmemory=2147483648
      - DFLY_proactor_threads=4
    volumes:
      - dragonflydata:/data
    networks:
      - internal

networks:
  internal:

volumes:
  db_data:
  dragonflydata:
