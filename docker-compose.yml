services:
  php:
    image: php
    build:
      context: .
      dockerfile: ./docker/php/dockerfile
    volumes:
      - .:/var/www/html
    networks:
      - internal
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/var/www/html/public
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - internal
    depends_on:
      - php

  db:
    image: mysql:8.1
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nexus-new
      MYSQL_USER: nexus
      MYSQL_PASSWORD: nexus
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

  cache:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: cache
    ulimits:
      memlock: -1
    environment:
      - DFLY_maxmemory=2147483648
      - DFLY_proactor_threads=4
    volumes:
      - dragonflydata:/data
    networks:
      - internal

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=elastic
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - es_tokens:/usr/share/elasticsearch/config/kibana-tokens
      - ./docker/elasticsearch/generate_kibana_token.sh:/usr/local/bin/generate_kibana_token.sh
    ports:
      - "9200:9200"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "elastic:elastic", "http://localhost:9200"]
      interval: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_SERVICE_ACCOUNT_TOKEN=
    volumes:
      - ./docker/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - internal

  logstash:
    image: docker.elastic.co/logstash/logstash:9.3.1
    container_name: logstash
    ports:
      - "5044:5044"
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - internal

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.10.0
    container_name: filebeat
    user: root
    volumes:
      - ./docker/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    networks:
      - internal

networks:
  internal:

volumes:
  db_data:
  dragonflydata:
  es_data:
  es_tokens:
